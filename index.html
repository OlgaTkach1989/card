body{

.container{

    margin:12px 0;
    padding:15px 18px;
    border:1px solid rgba(47, 38, 29, .14);
    border-radius:6px;
    text-decoration:none;
    color:#fffaf0;
    font-family:Arial, sans-serif;
    font-size:17px;
    font-weight:700;
    transition:transform .18s ease, box-shadow .18s ease;
}

.btn:hover,
.btn:focus{
    transform:translateY(-2px);
    box-shadow:0 10px 18px rgba(47, 38, 29, .16);

.cv{background:#16a34a;}
.certificate{background:#8b5e34;}
.github{background:#374151;}
.linkedin{background:#0a66c2;}
